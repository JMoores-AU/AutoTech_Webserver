<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ equipment_id }} - Equipment Monitor</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='AutoTech_Dark.ico') }}" id="favicon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: var(--theme-bg);
            color: var(--theme-text);
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .popout-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .popout-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--theme-border);
        }

        .popout-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--theme-text-bright);
            margin: 0;
        }

        /* Copy styles from main IP Finder */
        .equipment-card {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .equipment-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: var(--theme-bg);
            border-bottom: 1px solid var(--theme-border);
        }

        .equipment-id {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--theme-text-bright);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-badge.online { background: rgba(34, 197, 94, 0.15); color: var(--status-online); border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-badge.offline { background: rgba(239, 68, 68, 0.15); color: var(--status-offline); border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-badge.simulated { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }

        .equipment-body {
            padding: 24px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .info-section {
            background: var(--theme-bg);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .info-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--theme-text-bright);
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--theme-border);
        }
        .info-row:last-child { border-bottom: none; }

        .info-label {
            font-size: 0.85rem;
            color: var(--theme-text-muted);
        }

        .info-value {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Consolas', monospace;
            color: var(--theme-text);
        }

        .btn-copy {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--status-info);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-copy:hover { background: rgba(59, 130, 246, 0.25); }

        /* Comms ping indicators */
        .ping-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--theme-border);
            font-size: 0.85rem;
        }
        .ping-row:last-child { border-bottom: none; }
        .ping-row .ping-label { color: var(--theme-text-muted); }
        .ping-row .ping-ip { font-family: 'Consolas', monospace; font-size: 0.8rem; color: var(--theme-text-muted); margin-left: 6px; }
        .ping-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 600;
            font-size: 0.82rem;
        }
        .ping-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ping-dot.online  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
        .ping-dot.offline { background: #ef4444; }
        .ping-dot.checking { background: #94a3b8; animation: pulse-dot 1s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .ping-ms { font-size: 0.75rem; font-weight: 400; color: var(--theme-text-muted); margin-left: 2px; }

        /* Health Stats */
        .health-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        @media (max-width: 700px) {
            .health-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .health-stat {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-sm);
            padding: 12px;
        }

        .health-stat-label {
            font-size: 0.7rem;
            color: var(--theme-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .health-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Consolas', monospace;
        }

        .health-stat-value.good { color: var(--status-online); }
        .health-stat-value.warning { color: #f59e0b; }
        .health-stat-value.critical { color: var(--status-offline); }

        .refresh-indicator {
            font-size: 0.7rem;
            color: var(--theme-text-muted);
            font-style: italic;
        }

        /* Action Buttons */
        .actions-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--theme-border);
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-vnc { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
        .btn-vnc:hover:not(:disabled) { background: linear-gradient(135deg, #7c3aed, #6d28d9); }

        .btn-avi { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .btn-avi:hover:not(:disabled) { background: linear-gradient(135deg, #0891b2, #0e7490); }

        .btn-flight { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-flight:hover:not(:disabled) { background: linear-gradient(135deg, #d97706, #b45309); }

        .btn-tru { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-tru:hover:not(:disabled) { background: linear-gradient(135deg, #059669, #047857); }

        .btn-cleanup { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .btn-cleanup:hover:not(:disabled) { background: linear-gradient(135deg, #ea580c, #c2410c); }

        .action-log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-top: 16px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .action-log.active { display: block; }
        .log-line { padding: 2px 0; }
        .log-line.success { color: var(--status-online); }
        .log-line.error { color: var(--status-offline); }
        .log-line.info { color: var(--status-info); }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: currentColor; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-left: 4px solid var(--status-online); }
        .toast.error { border-left: 4px solid var(--status-offline); }
        .toast.info { border-left: 4px solid var(--status-info); }

        /* TRU Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--theme-border);
        }
        .modal-header h3 { margin: 0; color: var(--theme-text-bright); }
        .modal-close { background: none; border: none; color: var(--theme-text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: 20px; }
        .tru-info-grid { display: grid; gap: 12px; margin-bottom: 20px; }
        .tru-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--theme-bg);
            border-radius: var(--radius-sm);
        }
        .tru-info-row label { color: var(--theme-text-muted); font-size: 0.85rem; }
        .tru-info-row span { font-family: 'Consolas', monospace; color: var(--theme-text-bright); }
        .tru-instructions {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: var(--radius-md);
            padding: 16px;
        }
        .tru-instructions h4 { margin: 0 0 12px 0; color: #10b981; font-size: 0.9rem; }
        .tru-instructions ol { margin: 0; padding-left: 20px; color: var(--theme-text); font-size: 0.85rem; }
        .tru-instructions li { margin-bottom: 8px; }
        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px;
            border-top: 1px solid var(--theme-border);
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="popout-container">
        <div class="popout-header">
            <h1 class="popout-title">{{ equipment_id }} - Live Monitor</h1>
        </div>

        <div id="equipmentContent">
            <div style="text-align: center; padding: 40px; color: var(--theme-text-muted);">
                <div style="font-size: 2rem; margin-bottom: 16px;">⏳</div>
                <div>Loading equipment details...</div>
            </div>
        </div>
    </div>

    <script id="config-data" type="application/json">
        {"equipment_id": "{{ equipment_id }}", "isOffline": {{ 'true' if not online else 'false' }}}
    </script>

    <script>
        // Auto-apply theme from localStorage
        (function() {
            const savedTheme = localStorage.getItem('autotech_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const favicon = document.getElementById('favicon');
            if (favicon) {
                favicon.href = savedTheme === 'light'
                    ? "{{ url_for('static', filename='AutoTech_Light.ico') }}"
                    : "{{ url_for('static', filename='AutoTech_Dark.ico') }}";
            }
        })();

        const config = JSON.parse(document.getElementById('config-data').textContent);
        const equipmentId = config.equipment_id;
        let currentEquipment = null;
        let healthCheckInterval = null;
        let truConnected = false;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
            toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Copied: ${text}`, 'success');
            }).catch(() => {
                showToast('Failed to copy', 'error');
            });
        }

        async function loadEquipmentData() {
            try {
                const response = await fetch('/api/equipment_search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: equipmentId })
                });

                const data = await response.json();

                if (data.found) {
                    currentEquipment = data;
                    displayEquipment(data);
                } else {
                    document.getElementById('equipmentContent').innerHTML = `
                        <div style="text-align: center; padding: 40px; color: var(--status-offline);">
                            <div style="font-size: 2rem; margin-bottom: 16px;">❌</div>
                            <div>Equipment "${equipmentId}" not found</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('equipmentContent').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--status-offline);">
                        <div style="font-size: 2rem; margin-bottom: 16px;">⚠️</div>
                        <div>Failed to load equipment data</div>
                    </div>
                `;
            }
        }

        function displayEquipment(data) {
            const statusClass = data.vehicle_status === 'Online' ? 'online' :
                               data.vehicle_status === 'Simulated' ? 'simulated' : 'offline';

            const hasFlightRecorder = data.profile === 'K830E' || data.profile === 'K930E';
            const flightRecorderIP = data.flight_recorder_ip || (hasFlightRecorder ? getFlightRecorderIP(data.ptx_ip) : null);
            const ptxModel = data.ptxc_found ? 'PTXC' : (data.ptx_model || 'PTX10');

            document.getElementById('equipmentContent').innerHTML = `
                <div class="equipment-card">
                    <div class="equipment-header">
                        <div class="equipment-id">${data.OID}</div>
                        <span class="status-badge ${statusClass}">${data.vehicle_status || 'Unknown'}</span>
                    </div>

                    <div class="equipment-body">
                        <div class="info-grid">
                            <div class="info-section">
                                <h3>📋 Equipment Details</h3>
                                <div class="info-row">
                                    <span class="info-label">Equipment ID</span>
                                    <span class="info-value">${data.OID}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Profile / Type</span>
                                    <span class="info-value">${data.profile || 'Unknown'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">PTX Model</span>
                                    <span class="info-value">${ptxModel}${data.ptxc_found ? ' ✓' : ''}</span>
                                </div>
                                ${data.cid ? `
                                <div class="info-row">
                                    <span class="info-label">Category</span>
                                    <span class="info-value">${data.cid}</span>
                                </div>
                                ` : ''}
                            </div>

                            <div class="info-section">
                                <h3>🌐 Network Info</h3>
                                <div class="info-row">
                                    <span class="info-label">PTX IP</span>
                                    <span class="info-value">
                                        ${data.ptx_ip || 'N/A'}
                                        ${data.ptx_ip ? `<button class="btn-copy" onclick="copyToClipboard('${data.ptx_ip}')">📋</button>` : ''}
                                    </span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">AVI IP</span>
                                    <span class="info-value">
                                        ${data.avi_ip || 'N/A'}
                                        ${data.avi_ip ? `<button class="btn-copy" onclick="copyToClipboard('${data.avi_ip}')">📋</button>` : ''}
                                    </span>
                                </div>
                                ${flightRecorderIP ? `
                                <div class="info-row">
                                    <span class="info-label">Flight Recorder IP</span>
                                    <span class="info-value">
                                        ${flightRecorderIP}
                                        <button class="btn-copy" onclick="copyToClipboard('${flightRecorderIP}')">📋</button>
                                    </span>
                                </div>
                                ` : ''}
                            </div>

                            <div class="info-section" id="commsSection">
                                <h3>📡 Comms Info <span id="commsPingStatus" style="font-size:0.7rem;font-weight:normal;margin-left:8px;color:var(--theme-text-muted);">— via AVI</span></h3>
                                <div id="commsStats">
                                    <div style="text-align:center;padding:12px;color:var(--theme-text-muted);font-size:0.85rem;">
                                        Waiting for ping...
                                    </div>
                                </div>
                            </div>

                        </div>

                        <!-- PTX Health — full width below the info grid -->
                        <div class="info-section" id="healthSection" style="margin-bottom:24px;">
                            <h3>🏥 PTX Health <span class="refresh-indicator" id="healthRefreshTimer" style="font-size:0.7rem;font-weight:normal;margin-left:8px;"></span></h3>
                            <div id="healthStats">
                                <div style="text-align: center; padding: 12px; color: var(--theme-text-muted); font-size: 0.85rem;">
                                    Loading health data...
                                </div>
                            </div>
                        </div>

                        <div class="actions-section">
                            <button class="action-btn btn-vnc" ${!data.ptx_ip ? 'disabled' : ''} onclick="openVNC('${data.ptx_ip}', ${data.ptxc_found || false}, '${data.OID}', '${ptxModel}')">
                                🖥️ Open VNC
                            </button>
                            <button class="action-btn btn-avi" ${!data.avi_ip ? 'disabled' : ''} onclick="openAVI('${data.avi_ip}')">
                                📹 Open AVI
                            </button>
                            ${flightRecorderIP ? `
                            <button class="action-btn btn-flight" onclick="openFlightRecorder('${flightRecorderIP}')">
                                🛩️ Flight Recorder
                            </button>
                            ` : ''}
                            <button class="action-btn btn-tru" ${!data.ptx_ip && !data.avi_ip ? 'disabled' : ''} onclick="openTRU('${data.OID}', '${data.ptx_ip || ''}', '${data.avi_ip || ''}')">
                                🚛 TRU Access
                            </button>
                        </div>
                        <div class="action-log" id="actionLog"></div>
                    </div>
                </div>
            `;

            // Start health monitoring
            if (data.ptx_ip) {
                startHealthMonitoring(data.ptx_ip, ptxModel);
            }

            // Render comms section (mock visual — backend TBD)
            renderCommsMock(data.avi_ip);
        }

        function getFlightRecorderIP(ptxIP) {
            if (!ptxIP) return null;
            const parts = ptxIP.split('.');
            if (parts.length !== 4) return null;
            return `${parts[0]}.${parts[1]}.${parts[2]}.${parseInt(parts[3]) + 1}`;
        }

        // ── Comms Info ───────────────────────────────────────────────────────
        function renderCommsMock(avi_ip) {
            const el = document.getElementById('commsStats');
            const statusEl = document.getElementById('commsPingStatus');
            if (!el) return;

            const displayAviIp = avi_ip || '10.110.x.x';
            const isDemo = !avi_ip;

            if (statusEl) statusEl.textContent = isDemo ? '— demo mode' : `— via ${displayAviIp}`;

            const hosts = [
                { label: 'AVI',    ip: displayAviIp,    state: 'checking', ms: null },
                { label: 'PTX',    ip: '192.168.0.100', state: 'checking', ms: null },
                { label: 'GNSS 1', ip: '192.168.0.101', state: 'checking', ms: null },
                { label: 'GNSS 2', ip: '192.168.0.102', state: 'checking', ms: null },
            ];

            function row(h) {
                const dot    = `<span class="ping-dot ${h.state}"></span>`;
                const text   = h.state === 'checking' ? 'Checking...'
                             : h.state === 'online'   ? `Online${h.ms != null ? ` <span class="ping-ms">${h.ms}ms</span>` : ''}`
                             : 'Offline';
                const colour = h.state === 'online' ? '#22c55e' : h.state === 'offline' ? '#ef4444' : 'var(--theme-text-muted)';
                return `<div class="ping-row">
                    <span class="ping-label">${h.label}<span class="ping-ip">${h.ip}</span></span>
                    <span class="ping-indicator" style="color:${colour}">${dot}${text}</span>
                </div>`;
            }

            el.innerHTML = hosts.map(row).join('');

            if (isDemo) {
                const mockResults = [
                    { state: 'online',  ms: 3    },
                    { state: 'online',  ms: 12   },
                    { state: 'offline', ms: null },
                    { state: 'online',  ms: 14   },
                ];
                hosts.forEach((h, i) => {
                    setTimeout(() => {
                        hosts[i] = { ...hosts[i], ...mockResults[i] };
                        el.innerHTML = hosts.map(row).join('');
                    }, 700 + i * 500);
                });
                return;
            }

            fetch('/api/comms_ping', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ avi_ip })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    hosts.forEach((h, i) => { hosts[i] = { ...h, state: 'offline' }; });
                    if (statusEl) statusEl.textContent = `— error: ${data.error || 'unreachable'}`;
                } else {
                    const aviState = data.avi.status === 'Connected' ? 'online' : 'offline';
                    const ptxState = data.ptx.status  === 'Online'   ? 'online' : 'offline';
                    const g1State  = data.gnss_1.status === 'Online' ? 'online' : 'offline';
                    const g2State  = data.gnss_2.status === 'Online' ? 'online' : 'offline';
                    hosts[0] = { ...hosts[0], state: aviState, ms: data.avi.ping_time };
                    hosts[1] = { ...hosts[1], state: ptxState, ms: data.ptx.ping_time };
                    hosts[2] = { ...hosts[2], ip: data.gnss_1.ip || '192.168.0.101', state: g1State, ms: data.gnss_1.ping_time };
                    hosts[3] = { ...hosts[3], ip: data.gnss_2.ip || '192.168.0.102', state: g2State, ms: data.gnss_2.ping_time };
                }
                el.innerHTML = hosts.map(row).join('');
            })
            .catch(() => {
                hosts.forEach((h, i) => { hosts[i] = { ...h, state: 'offline' }; });
                el.innerHTML = hosts.map(row).join('');
                if (statusEl) statusEl.textContent = '— unreachable';
            });
        }
        // ── End Comms Info ────────────────────────────────────────────────────

        // Health monitoring functions
        async function fetchHealthCheck(ptx_ip, ptx_model) {
            if (config.isOffline || currentEquipment?.vehicle_status === 'Simulated') {
                return {
                    success: true,
                    cpu_usage: '38.50%',
                    memory_usage: '92.98%',
                    uptime: '1 day, 36 minutes',
                    disk_usage: '/dev/mmcblk0p3  5.6G  2.6G  2.7G  49% /media/realroot/home',
                    disk_percent: '49%'
                };
            }

            try {
                const response = await fetch('/api/linux_health_check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ptx_ip, ptx_model })
                });
                return await response.json();
            } catch (error) {
                console.error('Health check error:', error);
                return { success: false, error: error.message };
            }
        }

        function displayHealthStats(healthData) {
            const healthStats = document.getElementById('healthStats');
            if (!healthStats) return;

            if (!healthData.success) {
                healthStats.innerHTML = '<div style="text-align: center; padding: 12px; color: var(--status-offline); font-size: 0.85rem;">⚠️ ' + (healthData.error || 'Failed to load health data') + '</div>';
                return;
            }

            const cpuValue = parseFloat(healthData.cpu_usage) || 0;
            const memValue = parseFloat(healthData.memory_usage) || 0;
            const diskValue = parseFloat(healthData.disk_percent) || 0;

            const getCpuClass = (val) => val > 80 ? 'critical' : val > 60 ? 'warning' : 'good';
            const getMemClass = (val) => val > 90 ? 'critical' : val > 75 ? 'warning' : 'good';
            const getDiskClass = (val) => val > 85 ? 'critical' : val > 70 ? 'warning' : 'good';

            healthStats.innerHTML = '<div class="health-stats-grid">' +
                '<div class="health-stat"><div class="health-stat-label">CPU Usage</div><div class="health-stat-value ' + getCpuClass(cpuValue) + '">' + healthData.cpu_usage + '</div></div>' +
                '<div class="health-stat"><div class="health-stat-label">Memory Usage</div><div class="health-stat-value ' + getMemClass(memValue) + '">' + healthData.memory_usage + '</div></div>' +
                '<div class="health-stat"><div class="health-stat-label">PTX Uptime</div><div class="health-stat-value" style="font-size: 0.9rem; color: var(--theme-text-bright);">' + healthData.uptime + '</div></div>' +
                '<div class="health-stat"><div class="health-stat-label">Disk Usage</div><div class="health-stat-value ' + getDiskClass(diskValue) + '">' + healthData.disk_percent + '</div></div>' +
                '</div>';

            const timer = document.getElementById('healthRefreshTimer');
            if (timer) timer.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        }

        async function startHealthMonitoring(ptx_ip, ptx_model) {
            if (healthCheckInterval) clearInterval(healthCheckInterval);

            const data = await fetchHealthCheck(ptx_ip, ptx_model);
            displayHealthStats(data);

            healthCheckInterval = setInterval(async () => {
                const data = await fetchHealthCheck(ptx_ip, ptx_model);
                displayHealthStats(data);
            }, 30000);
        }

        // Action button functions (simplified versions)
        function openVNC(ip, isPTXC, equipmentName, ptxModel) {
            if (!ip) {
                showToast('No PTX IP available', 'error');
                return;
            }
            showToast('Opening VNC for ' + equipmentName, 'info');
            fetch('/api/vnc/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ptx_ip: ip, equipment_name: equipmentName, ptx_model: ptxModel })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('VNC launched successfully', 'success');
                } else {
                    showToast('VNC launch failed: ' + (data.error || 'Unknown error'), 'error');
                }
            });
        }

        function openAVI(ip) {
            if (!ip) {
                showToast('No AVI IP available', 'error');
                return;
            }
            window.open('http://' + ip, '_blank');
            showToast('Opening AVI in new tab', 'success');
        }

        function openFlightRecorder(ip) {
            if (!ip) {
                showToast('No Flight Recorder IP available', 'error');
                return;
            }
            window.open('http://' + ip, '_blank');
            showToast('Opening Flight Recorder in new tab', 'success');
        }

        async function openTRU(eqId, ptxIp, aviIp) {
            if (!ptxIp && !aviIp) { showToast('No IP available for TRU', 'error'); return; }

            const truBtn = document.querySelector('.btn-tru');
            truBtn.disabled = true;
            const via = aviIp ? `via AVI ${aviIp}` : `direct to PTX`;
            truBtn.innerHTML = `<span class="spinner"></span> Connecting ${via}...`;

            try {
                const response = await fetch('/api/tru_setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ equipment_ip: ptxIp, avi_ip: aviIp, equipment_name: eqId })
                });
                const data = await response.json();

                if (data.success) {
                    truConnected = true;
                    updateTRUStatus(true, eqId);
                    showTRUModal(data);
                    const label = data.simulated ? 'TRU simulated (offline)' : 'GNSS tunnels open';
                    showToast(label, data.simulated ? 'info' : 'success');
                } else {
                    showToast(data.message || 'TRU connection failed', 'error');
                }
            } catch (error) {
                showToast('TRU connection error', 'error');
            } finally {
                truBtn.disabled = false;
                truBtn.innerHTML = '🚛 TRU Access';
            }
        }

        async function disconnectTRU() {
            try {
                const response = await fetch('/api/tru_disconnect', { method: 'POST' });
                const data = await response.json();
                showToast(data.success ? 'TRU tunnel disconnected' : (data.message || 'Disconnect failed'),
                          data.success ? 'info' : 'error');
            } catch (e) {
                showToast('Disconnect error', 'error');
            }
            truConnected = false;
            updateTRUStatus(false);
            closeTRUModal();
        }

        function updateTRUStatus(active, eqName) {
            let banner = document.getElementById('truStatusBanner');
            if (!active) {
                if (banner) banner.remove();
                return;
            }
            if (!banner) {
                const actionsDiv = document.querySelector('.actions-section');
                if (!actionsDiv) return;
                banner = document.createElement('div');
                banner.id = 'truStatusBanner';
                banner.style.cssText = 'display:flex;align-items:center;justify-content:space-between;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:0.85rem;';
                actionsDiv.parentNode.insertBefore(banner, actionsDiv);
            }
            banner.innerHTML = `
                <span style="color:#10b981;">🚛 TRU tunnel active \u2014 ${eqName || equipmentId}</span>
                <button onclick="disconnectTRU()" style="background:#dc2626;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:0.8rem;">🔌 Disconnect</button>
            `;
        }

        let truStatusInterval = null;

        function showTRUModal(data) {
            const existing = document.getElementById('truModal');
            if (existing) existing.remove();

            const ports  = data.ports || { gnss1: 5001, gnss2: 5002, test_gnss: 5003 };
            const p1     = ports.gnss1     || 5001;
            const p2     = ports.gnss2     || 5002;
            const p3     = ports.test_gnss || 5003;
            const ptxTag = data.ptx_type
                ? `<span style="font-size:0.75rem;background:#1e40af;color:#fff;padding:2px 7px;border-radius:4px;margin-left:6px;">${data.ptx_type}</span>`
                : '';
            const truNote = data.tru_launched
                ? '<p style="color:#10b981;margin:8px 0 0;">✅ TRU.exe launched automatically</p>'
                : '<p style="color:#f59e0b;margin:8px 0 0;">⚠️ TRU.exe not found — launch manually</p>';
            const simBanner = data.simulated
                ? '<div style="background:#374151;border-left:3px solid #f59e0b;padding:6px 10px;margin-bottom:10px;font-size:0.8rem;color:#fbbf24;">⚠️ Offline mode — tunnels simulated</div>'
                : '';

            const modal = document.createElement('div');
            modal.id = 'truModal';
            modal.className = 'modal-overlay';
            modal.onclick = (e) => { if (e.target === modal) closeTRUModal(); };

            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>🛩️ TRU Tunnel Active ${ptxTag}</h3>
                        <button class="modal-close" onclick="closeTRUModal()">×</button>
                    </div>
                    <div class="modal-body">
                        ${simBanner}
                        <div class="tru-info-grid">
                            <div class="tru-info-row">
                                <label>Equipment</label>
                                <span>${data.equipment_name || 'Unknown'}</span>
                            </div>
                            <div class="tru-info-row">
                                <label>PTX IP</label>
                                <span style="font-family:'Consolas',monospace;">${data.ip_address || 'N/A'}</span>
                            </div>
                            <div class="tru-info-row">
                                <label>SSH Gateway</label>
                                <span style="font-family:'Consolas',monospace;">
                                    ${data.avi_ip
                                        ? `${data.avi_ip} <span style="color:#10b981;font-size:0.75rem;">(AVI)</span>`
                                        : `${data.ip_address || 'N/A'} <span style="color:#f59e0b;font-size:0.75rem;">(PTX direct)</span>`}
                                </span>
                            </div>
                        </div>

                        <!-- Live tunnel health -->
                        <div style="margin:16px 0 8px;font-size:0.8rem;font-weight:600;color:var(--theme-text-muted);text-transform:uppercase;letter-spacing:0.5px;">
                            Tunnel Status <span id="truLastPoll" style="font-weight:normal;font-size:0.7rem;margin-left:6px;"></span>
                        </div>
                        <div id="truTunnelStatus" style="background:var(--theme-bg);border-radius:var(--radius-sm);padding:8px 12px;">
                            <div style="color:var(--theme-text-muted);font-size:0.85rem;padding:4px 0;">Checking tunnel health...</div>
                        </div>

                        <div class="tru-info-grid" style="margin-top:16px;">
                            <div class="tru-info-row">
                                <label>GNSS 1 <span style="font-size:0.7rem;color:#9ca3af;">(.101)</span></label>
                                <span style="font-family:'Consolas',monospace;">localhost:${p1}</span>
                                <button class="btn-copy" onclick="copyToClipboard('localhost:${p1}')">📋</button>
                            </div>
                            <div class="tru-info-row">
                                <label>GNSS 2 <span style="font-size:0.7rem;color:#9ca3af;">(.102)</span></label>
                                <span style="font-family:'Consolas',monospace;">localhost:${p2}</span>
                                <button class="btn-copy" onclick="copyToClipboard('localhost:${p2}')">📋</button>
                            </div>
                            <div class="tru-info-row">
                                <label>Test GNSS <span style="font-size:0.7rem;color:#9ca3af;">(.103)</span></label>
                                <span style="font-family:'Consolas',monospace;">localhost:${p3}</span>
                                <button class="btn-copy" onclick="copyToClipboard('localhost:${p3}')">📋</button>
                            </div>
                        </div>

                        <div class="tru-instructions">
                            <h4>📋 TRU Configuration</h4>
                            <ol>
                                <li>In TRU, set connection type to <strong>TCP/IP</strong></li>
                                <li>Enter the localhost port for each GNSS receiver:
                                    <ul style="margin-top:4px;">
                                        <li><strong>GNSS 1:</strong> localhost:${p1}</li>
                                        <li><strong>GNSS 2:</strong> localhost:${p2}</li>
                                        <li><strong>Test GNSS:</strong> localhost:${p3}</li>
                                    </ul>
                                </li>
                                <li>Only one tunnel can run at a time — disconnect when done</li>
                            </ol>
                            ${truNote}
                        </div>
                    </div>
                    <div class="modal-footer" style="display:flex;gap:8px;justify-content:flex-end;">
                        <button class="action-btn" style="background:#dc2626;" onclick="disconnectTRU()">🔌 Disconnect Tunnel</button>
                        <button class="action-btn btn-tru" onclick="closeTRUModal()">✅ Keep Open</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // Start polling tunnel health
            pollTRUStatus();
            truStatusInterval = setInterval(pollTRUStatus, 5000);
        }

        async function pollTRUStatus() {
            const statusEl = document.getElementById('truTunnelStatus');
            const pollEl   = document.getElementById('truLastPoll');
            if (!statusEl) {
                clearInterval(truStatusInterval);
                return;
            }
            try {
                const r = await fetch('/api/tru_status');
                const data = await r.json();
                if (pollEl) pollEl.textContent = '· updated ' + new Date().toLocaleTimeString([], {hour12: false});

                if (!data.success || data.count === 0) {
                    statusEl.innerHTML = '<div style="color:#ef4444;font-size:0.85rem;padding:4px 0;">⚠️ No active tunnel found — process may have died</div>';
                    return;
                }

                const conn = Object.values(data.connections)[0];
                const ps   = conn.ports_status || {};
                const portLabels = { gnss1: 'GNSS 1', gnss2: 'GNSS 2', test_gnss: 'Test GNSS' };

                let html = '';
                if (!conn.alive) {
                    html = '<div style="color:#ef4444;font-size:0.85rem;padding:4px 0;">🔴 Tunnel process died — reconnect</div>';
                } else {
                    for (const [key, label] of Object.entries(portLabels)) {
                        const ps_entry = ps[key] || {};
                        const listening = ps_entry.listening;
                        const port = ps_entry.port || (key === 'gnss1' ? 5001 : key === 'gnss2' ? 5002 : 5003);
                        const dot   = listening ? '🟢' : '🔴';
                        const state = listening ? '<span style="color:#22c55e;font-weight:600;">Listening</span>' : '<span style="color:#ef4444;">Not listening</span>';
                        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--theme-border);font-size:0.85rem;">
                            <span>${dot} ${label} <span style="font-family:'Consolas',monospace;color:var(--theme-text-muted);font-size:0.8rem;">localhost:${port}</span></span>
                            ${state}
                        </div>`;
                    }
                }
                statusEl.innerHTML = html || '<div style="color:var(--theme-text-muted);font-size:0.85rem;">No port data</div>';

            } catch (e) {
                if (statusEl) statusEl.innerHTML = '<div style="color:#ef4444;font-size:0.85rem;padding:4px 0;">Failed to check tunnel status</div>';
            }
        }

        function closeTRUModal() {
            clearInterval(truStatusInterval);
            truStatusInterval = null;
            const modal = document.getElementById('truModal');
            if (modal) modal.remove();
        }

        // Load equipment data on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadEquipmentData();
        });

        // Clean up health monitoring and TRU tunnels on page unload
        window.addEventListener('beforeunload', () => {
            if (healthCheckInterval) clearInterval(healthCheckInterval);
            if (truConnected) {
                navigator.sendBeacon('/api/tru_disconnect', '');
            }
        });
    </script>
</body>
</html>
