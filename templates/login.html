<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoTech</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='AutoTech_Dark.ico') }}" id="favicon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        // Auto-apply theme from localStorage
        (function() {
            const savedTheme = localStorage.getItem('autotech_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const favicon = document.getElementById('favicon');
            if (favicon) {
                favicon.href = savedTheme === 'light'
                    ? "{{ url_for('static', filename='AutoTech_Light.ico') }}"
                    : "{{ url_for('static', filename='AutoTech_Dark.ico') }}";
            }
        })();
    </script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-bg);
            padding: 20px;
        }
        
        .login-card {
            background: var(--theme-bg-card);
            border: 1px solid var(--theme-border);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--theme-bg-card-hover), var(--theme-bg-card));
            padding: 40px 30px;
            text-align: center;
            border-bottom: 1px solid var(--theme-border);
        }
        
        .login-logo {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--theme-text-bright);
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--theme-text-muted);
        }
        
        .login-body {
            padding: 30px;
        }
        
        .login-footer {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--theme-border);
            text-align: center;
        }
        
        .login-footer a {
            color: var(--theme-primary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🛠️</div>
                <h1 class="login-title">AutoTech Dashboard</h1>
                <p class="login-subtitle">Mining Equipment Remote Access System</p>
            </div>
            
            <div class="login-body">
                <form method="POST">
                    <div class="form-group">
                        <label class="form-label" for="password">Enter Password</label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="form-input" 
                               placeholder="Enter password to access tools"
                               autocomplete="current-password"
                               autofocus
                               required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        🔓 Unlock Tools
                    </button>
                </form>
            </div>
            
            <div class="login-footer">
                <a href="{{ url_for('dashboard') }}">← Return to Dashboard</a>
            </div>
        </div>
    </div>
    
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
            <div class="flash error">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}
</body>
</html>
